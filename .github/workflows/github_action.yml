name: DNS Block&Redirect Configurer cron task

on:
  schedule:
    - cron: '30 1 * * *' # 04:30 MSK (01:30 UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: DNS

    env:
      DNS: ${{ vars.DNS }}
      BLOCK: ${{ vars.BLOCK }}
      REDIRECT: ${{ vars.REDIRECT }}

      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      TZ: Europe/Moscow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter Spotify from hosts list
        run: |
          curl -s "$REDIRECT" -o /tmp/hosts_original
          python3 - << 'EOF'
          with open('/tmp/hosts_original', 'r') as f:
              lines = f.readlines()
          result = []
          skip = False
          for line in lines:
              if line.strip() == '# Spotify':
                  skip = True
                  continue
              if skip and line.startswith('# ') and line.strip() != '# Spotify':
                  skip = False
              if not skip:
                  result.append(line)
          with open('/tmp/hosts_filtered', 'w') as f:
              f.writelines(result)
          EOF
          echo "REDIRECT=file:///tmp/hosts_filtered" >> $GITHUB_ENV

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Run application
        run: |
          echo "Starting application..."
          java --enable-preview -jar target/*.jar
